<svg width="100%" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── 1. Camera ── -->
  <g>
    <rect x="230" y="40" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="340" y="63" text-anchor="middle" dominant-baseline="central">Camera</text>
    <text font-size="12" fill="#0F6E56" x="340" y="81" text-anchor="middle" dominant-baseline="central">OpenCV · camera.py</text>
  </g>

  <line x1="340" y1="96" x2="340" y2="146" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── 2. Motion detector ── -->
  <g>
    <rect x="230" y="146" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="340" y="169" text-anchor="middle" dominant-baseline="central">Motion detector</text>
    <text font-size="12" fill="#0F6E56" x="340" y="187" text-anchor="middle" dominant-baseline="central">MOG2 · motion_detector.py</text>
  </g>

  <line x1="340" y1="202" x2="340" y2="236" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- decision diamond -->
  <polygon points="340,236 390,264 340,292 290,264" fill="none" stroke="#888780" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="340" y="261" text-anchor="middle" dominant-baseline="central">motion?</text>

  <!-- No branch right -->
  <line x1="390" y1="264" x2="530" y2="264" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#5F5E5A" x="460" y="255" text-anchor="middle">no</text>
  <rect x="530" y="242" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#444441" x="585" y="264" text-anchor="middle" dominant-baseline="central">Keep watching</text>

  <!-- loop back dashed -->
  <path d="M640 264 L660 264 L660 68 L450 68" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Yes branch down -->
  <line x1="340" y1="292" x2="340" y2="342" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#5F5E5A" x="354" y="320" text-anchor="start">yes</text>

  <!-- ── 3. Intelligence ── -->
  <g>
    <rect x="230" y="342" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#3C3489" x="340" y="365" text-anchor="middle" dominant-baseline="central">Intelligence</text>
    <text font-size="12" fill="#534AB7" x="340" y="383" text-anchor="middle" dominant-baseline="central">GPT-4o Vision · analyzer.py</text>
  </g>

  <line x1="450" y1="370" x2="490" y2="370" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text font-size="12" fill="#5F5E5A" x="495" y="362" text-anchor="start">analyzes frame</text>
  <text font-size="12" fill="#5F5E5A" x="495" y="378" text-anchor="start">+ history context</text>

  <line x1="340" y1="398" x2="340" y2="448" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── 4. Memory ── -->
  <g>
    <rect x="230" y="448" width="220" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#633806" x="340" y="471" text-anchor="middle" dominant-baseline="central">Memory</text>
    <text font-size="12" fill="#854F0B" x="340" y="489" text-anchor="middle" dominant-baseline="central">SQLite + snapshots · event_store.py</text>
  </g>

  <line x1="450" y1="476" x2="490" y2="476" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text font-size="12" fill="#5F5E5A" x="495" y="468" text-anchor="start">stores event</text>
  <text font-size="12" fill="#5F5E5A" x="495" y="484" text-anchor="start">+ metadata</text>

  <!-- feedback loop memory -> intelligence -->
  <path d="M230 476 L190 476 L190 370 L230 370" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#5F5E5A" x="184" y="430" text-anchor="end">context</text>

  <line x1="340" y1="504" x2="340" y2="554" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── 5. Alert ── -->
  <g>
    <rect x="230" y="554" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#712B13" x="340" y="577" text-anchor="middle" dominant-baseline="central">Alert</text>
    <text font-size="12" fill="#993C1D" x="340" y="595" text-anchor="middle" dominant-baseline="central">Telegram · telegram_notifier.py</text>
  </g>

  <line x1="450" y1="582" x2="490" y2="582" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text font-size="12" fill="#5F5E5A" x="495" y="574" text-anchor="start">if threat</text>
  <text font-size="12" fill="#5F5E5A" x="495" y="590" text-anchor="start">>= threshold</text>

  <line x1="340" y1="610" x2="340" y2="660" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── 6. CLI ── -->
  <g>
    <rect x="230" y="660" width="220" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#444441" x="340" y="683" text-anchor="middle" dominant-baseline="central">CLI interface</text>
    <text font-size="12" fill="#5F5E5A" x="340" y="701" text-anchor="middle" dominant-baseline="central">Rich terminal · interface.py</text>
  </g>

  <line x1="450" y1="688" x2="490" y2="688" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text font-size="12" fill="#5F5E5A" x="495" y="688" text-anchor="start" dominant-baseline="central">query + analyze events</text>

  <!-- ── Legend ── -->
  <rect x="40" y="790" width="600" height="50" rx="8" fill="none" stroke="#B4B2A9" stroke-dasharray="4 3" stroke-width="0.5"/>
  <rect x="60" y="808" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="76" y="818" dominant-baseline="central">Vision</text>
  <rect x="140" y="808" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="156" y="818" dominant-baseline="central">Intelligence</text>
  <rect x="255" y="808" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="271" y="818" dominant-baseline="central">Memory</text>
  <rect x="340" y="808" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="356" y="818" dominant-baseline="central">Alerts</text>
  <rect x="415" y="808" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="431" y="818" dominant-baseline="central">Interface</text>
  <line x1="490" y1="813" x2="510" y2="813" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#5F5E5A" x="516" y="818" dominant-baseline="central">feedback</text>
</svg>
